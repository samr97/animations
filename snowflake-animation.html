<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  <style>
    body { margin:0; }
    #anim { width:100%; height:100vh; }
  </style>
</head>
<body>

<div id="anim"></div>

<script>
lottie.loadAnimation({
  container: document.getElementById("anim"),
  renderer: "svg",
  loop: true,
  autoplay: true,
  path: "summit-hero-secondary.json"
});
</script>

</body>
</html>
